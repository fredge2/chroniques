<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci - Message envoyé</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .merci-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 20px;
        }
        .merci-card {
            background: white;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        .merci-icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="merci-container">
        <div class="merci-card">
            <div class="merci-icon">🕊️</div>
            <h1>Merci pour votre message !</h1>
            <p>Nous avons bien reçu votre demande. L'équipe de l'Association Patrimoine Chrétien Vivant vous répondra dans les plus brefs délais.</p>
            <br>
            <a href="index.html" class="btn">Retour à l'accueil</a>
        </div>
    </div>
</body>
</html>
